name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Signed Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run tests before release
        run: |
          pip install -e . 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || true
          pip install pytest
          pytest tests/ -v

      - name: Install sigstore
        run: pip install sigstore

      - name: Sign release artifacts with sigstore
        run: |
          # Create source distribution for signing
          pip install build
          python -m build --sdist
          # Sign with sigstore (keyless, OIDC-based)
          python -m sigstore sign dist/*.tar.gz

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            CHANGELOG=$(git log --oneline "$PREV_TAG"..HEAD)
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*.tar.gz
            dist/*.sigstore.json
          generate_release_notes: true
