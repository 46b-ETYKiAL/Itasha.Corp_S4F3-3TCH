<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 548" width="1280" height="548">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(500px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.99; } }
    @keyframes traceFade1 { 0%,100% { opacity: 0.15; } 50% { opacity: 0.4; } }
    @keyframes traceFade2 { 0%,100% { opacity: 0.2; } 50% { opacity: 0.45; } }
    @keyframes traceFade3 { 0%,100% { opacity: 0.1; } 50% { opacity: 0.35; } }
    @keyframes etchDraw { 0% { stroke-dashoffset: 400; } 100% { stroke-dashoffset: 0; } }
    @keyframes diamondPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.9; } }
    @keyframes heartbeat { 0%,100% { r: 3; opacity: 0.5; } 15% { r: 4; opacity: 0.9; } 30% { r: 3; opacity: 0.5; } 45% { r: 3.5; opacity: 0.8; } 60% { r: 3; opacity: 0.5; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3500; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.015; } }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>

  <!-- Outer bezel -->
  <rect x="0" y="0" width="1280" height="548" rx="18" ry="18" fill="#111118" stroke="#2a2833" stroke-width="2"/>
  <!-- Inner bezel -->
  <rect x="12" y="12" width="1256" height="524" rx="12" ry="12" fill="#18181f"/>
  <!-- Screen -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="#08060d"/>
  <!-- Scanlines -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="url(#scanlines)"/>
  <!-- Vignette -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="url(#vignette)"/>


  <!-- Edge glow -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="none" stroke="#e020ff" stroke-width="1" opacity="0.06" stroke-dasharray="20,3480" style="animation: edgeGlow 12s linear infinite;"/>
  <!-- Scanline sweep -->
  <rect x="24" y="24" width="1232" height="2" fill="#e020ff" opacity="0.03" style="animation: sweep 10s linear infinite;"/>


  <!-- Phosphor bloom -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="white" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  <!-- Main content with flicker -->
  <g style="animation: flicker 6s infinite;">
    <!-- Header text -->
    <text x="640" y="80" text-anchor="middle" fill="#5a5869" font-size="11" letter-spacing="6" filter="url(#phosphor)">I T A S H A . C O R P</text>

    <!-- Repo name -->
    <text x="640" y="130" text-anchor="middle" fill="#e020ff" font-size="22" font-weight="bold" letter-spacing="4" filter="url(#glow)">[ S 4 F 3 : 3 T C H ]</text>

    <!-- Boot sequence -->
    <g fill="#e020ff" font-size="12" filter="url(#phosphor)" opacity="0.9">
      <text x="60" y="190">etch.init ───────────────────────</text>
      <text x="60" y="220" style="animation: bootReveal 0.3s ease-out 0.2s both;">&gt; comfyui.runtime.detect()</text>
      <text x="500" y="220" fill="#01fe36">[ OK ]</text>
      <text x="60" y="248" style="animation: bootReveal 0.3s ease-out 0.5s both;">&gt; nodes.custom.register(18)</text>
      <text x="500" y="248" fill="#01fe36">[ OK ]</text>
      <text x="60" y="276" style="animation: bootReveal 0.3s ease-out 0.8s both;">&gt; workflows.template.load()</text>
      <text x="500" y="276" fill="#01fe36">[ OK ]</text>
      <text x="60" y="304" style="animation: bootReveal 0.3s ease-out 1.1s both;">&gt; schema.validate(pydantic)</text>
      <text x="500" y="304" fill="#01fe36">[ OK ]</text>
      <text x="60" y="332" style="animation: bootReveal 0.3s ease-out 1.4s both;">&gt; etch.lab.calibrate()</text>
      <text x="500" y="332" fill="#01fe36">[ OK ]</text>
      <text x="60" y="360">───────────────────────────────────</text>
      <text x="60" y="400">etch lab</text>
      <text x="200" y="400">.......................</text>
      <text x="430" y="400" fill="#e020ff" font-weight="bold">[ 0P3N S0URC3 ]</text>
    </g>

    <!-- Unique element: Circuit trace etching pattern -->
    <g transform="translate(780, 210)">
      <!-- Completed traces (staggered fade animation) -->
      <polyline points="0,30 40,30 40,0 80,0 80,50 120,50" fill="none" stroke="#e020ff" stroke-width="1.2" style="animation: traceFade1 4s ease-in-out infinite;"/>
      <polyline points="0,70 30,70 30,100 70,100 70,70 100,70 100,120" fill="none" stroke="#e020ff" stroke-width="1.2" style="animation: traceFade2 4s ease-in-out 0.8s infinite;"/>
      <polyline points="120,50 120,80 160,80 160,30 200,30" fill="none" stroke="#e020ff" stroke-width="1.2" style="animation: traceFade3 4s ease-in-out 1.6s infinite;"/>
      <polyline points="100,120 140,120 140,150 180,150" fill="none" stroke="#e020ff" stroke-width="1.2" style="animation: traceFade1 4s ease-in-out 2.4s infinite;"/>

      <!-- Via pads (small circles at junctions) -->
      <circle cx="40" cy="30" r="2.5" fill="#e020ff" opacity="0.25"/>
      <circle cx="80" cy="50" r="2.5" fill="#e020ff" opacity="0.25"/>
      <circle cx="70" cy="100" r="2.5" fill="#e020ff" opacity="0.25"/>
      <circle cx="120" cy="80" r="2.5" fill="#e020ff" opacity="0.25"/>
      <circle cx="140" cy="120" r="2.5" fill="#e020ff" opacity="0.25"/>

      <!-- Active trace being drawn -->
      <polyline points="180,150 220,150 220,100 260,100 260,60 290,60" fill="none" stroke="#e020ff" stroke-width="1.5" opacity="0.8" stroke-dasharray="400" style="animation: etchDraw 4s linear infinite;"/>

      <!-- Etching tool head (diamond at active tip) -->
      <g transform="translate(290, 60)" style="animation: diamondPulse 1s ease-in-out infinite;">
        <polygon points="0,-6 6,0 0,6 -6,0" fill="#e020ff" opacity="0.9" filter="url(#glow)"/>
      </g>

      <!-- Secondary completed traces for density -->
      <line x1="200" y1="30" x2="260" y2="30" stroke="#e020ff" stroke-width="0.8" opacity="0.2"/>
      <line x1="260" y1="30" x2="260" y2="10" stroke="#e020ff" stroke-width="0.8" opacity="0.2"/>
      <line x1="180" y1="150" x2="180" y2="180" stroke="#e020ff" stroke-width="0.8" opacity="0.15"/>
      <line x1="180" y1="180" x2="240" y2="180" stroke="#e020ff" stroke-width="0.8" opacity="0.15"/>

      <!-- IC pad outlines -->
      <rect x="55" y="40" width="16" height="16" fill="none" stroke="#e020ff" stroke-width="0.6" opacity="0.2" rx="1"/>
      <rect x="190" y="85" width="16" height="16" fill="none" stroke="#e020ff" stroke-width="0.6" opacity="0.2" rx="1"/>
    </g>
  </g>

  <!-- Corner brackets -->
  <path d="M 40,40 L 40,70 M 40,40 L 70,40" stroke="#e020ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1240,40 L 1240,70 M 1240,40 L 1210,40" stroke="#e020ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 40,510 L 40,480 M 40,510 L 70,510" stroke="#e020ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1240,510 L 1240,480 M 1240,510 L 1210,510" stroke="#e020ff" stroke-width="1.5" fill="none" opacity="0.1"/>

  <!-- Ambient accent lines -->
  <line x1="24" y1="200" x2="1256" y2="200" stroke="#e020ff" stroke-width="0.5" opacity="0.04"/>
  <line x1="24" y1="350" x2="1256" y2="350" stroke="#e020ff" stroke-width="0.5" opacity="0.03"/>

  <!-- Status indicator dots -->
  <circle cx="50" cy="505" r="3" fill="#01fe36" opacity="0.5" style="animation: heartbeat 2s ease-in-out infinite;"/>
  <circle cx="62" cy="505" r="3" fill="#e020ff" opacity="0.4"/>
  <circle cx="74" cy="505" r="3" fill="#5a5869" opacity="0.3"/>

  <!-- Bezel detail lines -->
  <line x1="30" y1="14" x2="1250" y2="14" stroke="#2a2833" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="536" x2="1250" y2="536" stroke="#2a2833" stroke-width="0.5" opacity="0.3"/>

  <!-- Bezel labels -->
  <text x="40" y="542" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#4a4859" letter-spacing="2">ITASHA.CORP</text>
  <text x="1200" y="542" text-anchor="end" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#4a4859">CRT-S4F3</text>

  <!-- Power LED -->
  <circle cx="1232" cy="534" r="6" fill="#01fe36" opacity="0.3"/>
  <circle cx="1232" cy="534" r="4" fill="#01fe36" opacity="1.0"/>
</svg>