<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      @keyframes glow-pulse {
        0%, 100% { filter: url(#accent-glow); opacity: 1; }
        50% { filter: url(#accent-glow-bright); opacity: 0.92; }
      }
      @keyframes bar-glow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.35; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; }
      }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e020ff" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="white" opacity="0.06"/>
    </pattern>
    <filter id="accent-glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="accent-glow-bright">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="#0e0c15"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#scanlines)"/>
  <rect width="1280" height="640" fill="url(#vignette)"/>

  <!-- Circuit trace background -->
  <path d="M 100,100 L 100,180 L 200,180 L 200,140 L 280,140 L 280,220 L 350,220 L 350,160 L 420,160 L 420,250 L 500,250" fill="none" stroke="#e020ff" stroke-width="0.8" opacity="0.04"/>
  <path d="M 780,400 L 780,480 L 880,480 L 880,440 L 960,440 L 960,520 L 1050,520 L 1050,460 L 1130,460 L 1130,380 L 1180,380" fill="none" stroke="#e020ff" stroke-width="0.8" opacity="0.04"/>

  <!-- Accent bar -->
  <rect y="632" width="1280" height="8" fill="#e020ff"/>
  <!-- Accent bar glow -->
  <rect y="632" width="1280" height="4" fill="#e020ff" opacity="0.15" style="animation: bar-glow 3s ease-in-out infinite;" filter="url(#accent-glow)"/>

  <text x="640" y="160" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#7a7a8a" letter-spacing="6">ITASHA.CORP</text>

  <!-- Repo name with glow pulse -->
  <text x="640" y="280" text-anchor="middle" font-family="'Courier New',monospace" font-size="36" font-weight="bold" fill="#e020ff" style="animation: glow-pulse 4s ease-in-out infinite;">[ S4F3-3TCH ]</text>

  <text x="640" y="330" text-anchor="middle" font-family="'Courier New',monospace" font-size="17" fill="#9a9aaa">Open-source ComfyUI custom nodes</text>

  <!-- Graphic: ComfyUI node boxes (scaled up) -->
  <g transform="translate(640, 435) scale(1.4) translate(-640, -435)">
    <rect x="530" y="400" width="70" height="35" rx="4" fill="none" stroke="#e020ff" stroke-width="1.5" opacity="0.75"/>
    <text x="565" y="422" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#e020ff" opacity="0.65">LOAD</text>
    <rect x="640" y="390" width="70" height="35" rx="4" fill="none" stroke="#e020ff" stroke-width="1.5" opacity="0.65"/>
    <text x="675" y="412" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#e020ff" opacity="0.55">ETCH</text>
    <rect x="640" y="440" width="70" height="35" rx="4" fill="none" stroke="#e020ff" stroke-width="1.5" opacity="0.65"/>
    <text x="675" y="462" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#e020ff" opacity="0.55">PROC</text>
    <rect x="750" y="415" width="70" height="35" rx="4" fill="none" stroke="#e020ff" stroke-width="1.5" opacity="0.55"/>
    <text x="785" y="437" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#e020ff" opacity="0.45">OUT</text>
    <line x1="600" y1="412" x2="640" y2="405" stroke="#e020ff" stroke-width="1" opacity="0.55"/>
    <line x1="600" y1="420" x2="640" y2="455" stroke="#e020ff" stroke-width="1" opacity="0.55"/>
    <line x1="710" y1="407" x2="750" y2="428" stroke="#e020ff" stroke-width="1" opacity="0.45"/>
    <line x1="710" y1="457" x2="750" y2="437" stroke="#e020ff" stroke-width="1" opacity="0.45"/>
  </g>

  <!-- Stat labels -->
  <text x="440" y="570" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#e020ff" opacity="0.5" letter-spacing="2">Python</text>
  <text x="640" y="570" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#e020ff" opacity="0.5" letter-spacing="2">18 Workflows</text>
  <text x="840" y="570" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#e020ff" opacity="0.5" letter-spacing="2">PUBLIC_NODE</text>

  <!-- Corner brackets -->
  <path d="M 40,40 L 40,80 M 40,40 L 80,40" stroke="#e020ff" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 1240,40 L 1240,80 M 1240,40 L 1200,40" stroke="#e020ff" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 40,600 L 40,560 M 40,600 L 80,600" stroke="#e020ff" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 1240,600 L 1240,560 M 1240,600 L 1200,600" stroke="#e020ff" stroke-width="2" fill="none" opacity="0.25"/>

  <!-- Divider -->
  <line x1="440" y1="345" x2="840" y2="345" stroke="#e020ff" stroke-width="0.5" opacity="0.4"/>

  <!-- Built by -->
  <text x="640" y="598" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7a7889">Built by Itasha Corp</text>
</svg>